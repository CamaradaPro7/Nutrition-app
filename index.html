<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Nutrición</title>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
    <h1>🍎 Mi Nutrición</h1>
</header>

<section class="card resumen">

    <p class="fecha">Hoy</p>

    <h2 id="kcal">0 / 2600</h2>
    <span>kcal</span>

    <div class="macro">
        <div>
            🥩 Proteínas
        </div>
        <div id="proteinas">
            0 g
        </div>
    </div>

    <progress value="0" max="180"></progress>

    <div class="macro">
        <div>
            🍚 Hidratos
        </div>
        <div id="hidratos">
            0 g
        </div>
    </div>

    <progress value="0" max="250"></progress>

    <div class="macro">
        <div>
            🥑 Grasas
        </div>
        <div id="grasas">
            0 g
        </div>
    </div>

    <progress value="0" max="70"></progress>

</section>

<div id="meals"></div>

<script src="js/app.js"></script>

</body>
</html>
