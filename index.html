<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Nutrición</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="app">

<header class="header">

<div>

<h1>🍎 Mi Nutrición</h1>

<p id="today"></p>

</div>

<button id="settingsBtn" class="icon-btn">
⚙️
</button>

</header>


<section class="dashboard">

<div class="kcal">

<span class="small">
Calorías
</span>

<h2 id="kcalToday">
0
</h2>

<p>
de <span id="goalKcal">2600</span> kcal
</p>

</div>

<div class="ring">

<div class="ring-value">
0%
</div>

</div>

<div class="macro">

<div>

<span>🥩 Proteínas</span>

<strong id="proteinValue">
0 g
</strong>

</div>

<div class="progress">
<div id="proteinBar"></div>
</div>

</div>

<div class="macro">

<div>

<span>🍚 Hidratos</span>

<strong id="carbsValue">
0 g
</strong>

</div>

<div class="progress">
<div id="carbsBar"></div>
</div>

</div>

<div class="macro">

<div>

<span>🥑 Grasas</span>

<strong id="fatValue">
0 g
</strong>

</div>

<div class="progress">
<div id="fatBar"></div>
</div>

</div>

</section>


<section id="meals">

</section>

</div>



<div id="foodModal" class="modal hidden">

<div class="sheet">

<div class="sheet-header">

<h2>
Añadir alimento
</h2>

<button id="closeModal">
✕
</button>

</div>

<input
id="searchInput"
type="text"
placeholder="Buscar alimento...">

<div id="foodList">

</div>

</div>

</div>



<nav class="tabbar">

<button class="active">
🏠
</button>

<button>
📅
</button>

<button class="add">
＋
</button>

<button>
📈
</button>

<button>
⚙️
</button>

</nav>


<script src="js/app.js"></script>

</body>

</html>
