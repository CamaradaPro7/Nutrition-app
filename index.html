<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mi Nutrición</title>

<link rel="stylesheet" href="css/styles.css">

<meta name="theme-color" content="#0d1117">

</head>

<body>

<div class="app">

<header class="header">

<div class="logo">
🍎
</div>

<div class="title">

<h1>Mi Nutrición</h1>

<p id="fecha">
Cargando...
</p>

</div>

<button class="settings" id="btnSettings">
⚙️
</button>

</header>



<section class="dashboard">

<div class="ring">

<div class="ring-center">

<span id="totalKcal">
0
</span>

<small>
de 2600 kcal
</small>

</div>

</div>


<div class="macros">

<div class="macro">

<span>
🥩 Proteínas
</span>

<strong id="protein">
0 g
</strong>

</div>

<div class="macro">

<span>
🍚 Hidratos
</span>

<strong id="carbs">
0 g
</strong>

</div>

<div class="macro">

<span>
🥑 Grasas
</span>

<strong id="fat">
0 g
</strong>

</div>

</div>

</section>



<section id="meals">



<div class="meal" data-meal="desayuno">

<div class="meal-header">

<h2>
🍳 Desayuno
</h2>

<button class="add">
+
</button>

</div>

<div class="meal-body">

<p class="emptyMeal">
Sin alimentos
</p>

<div class="meal-list">

</div>

</div>

</div>



<div class="meal" data-meal="comida">

<div class="meal-header">

<h2>
🍝 Comida
</h2>

<button class="add">
+
</button>

</div>

<div class="meal-body">

<p class="emptyMeal">
Sin alimentos
</p>

<div class="meal-list">

</div>

</div>

</div>



<div class="meal" data-meal="merienda">

<div class="meal-header">

<h2>
🥪 Merienda
</h2>

<button class="add">
+
</button>

</div>

<div class="meal-body">

<p class="emptyMeal">
Sin alimentos
</p>

<div class="meal-list">

</div>

</div>

</div>

<div class="meal" data-meal="cena">

<div class="meal-header">

<h2>
🌙 Cena
</h2>

<button class="add">
+
</button>

</div>

<div class="meal-body">

<p class="emptyMeal">
Sin alimentos
</p>

<div class="meal-list">

</div>

</div>

</div>

</section>

</div>


<div id="modal" class="modal">

<div class="modal-content">

<h2 class="modal-title">
Añadir alimento
</h2>

<input
id="searchFood"
class="search"
type="text"
placeholder="Buscar alimento...">

<div id="foodResults">

<div class="food-item">

<div>

<div class="food-name">
Pechuga de pollo
</div>

<div class="food-kcal">
110 kcal / 100 g
</div>

</div>

</div>

<div class="food-item">

<div>

<div class="food-name">
Arroz blanco
</div>

<div class="food-kcal">
130 kcal / 100 g
</div>

</div>

</div>

<div class="food-item">

<div>

<div class="food-name">
Plátano
</div>

<div class="food-kcal">
89 kcal / 100 g
</div>

</div>

</div>

</div>

</div>

</div>


<nav class="bottom-nav">

<button class="active">
🏠
</button>

<button>
📅
</button>

<button>
➕
</button>

<button>
📊
</button>

<button>
⚙️
</button>

</nav>


<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
