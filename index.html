<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Mi Nutrición</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="app">

<header class="header">

<div class="logo">
🍎
</div>

<div class="title">

<h1>Mi Nutrición</h1>

<p id="fecha"></p>

</div>

<button class="settings">
⚙️
</button>

</header>


<section class="dashboard">

<div class="ring">

<div class="ring-center">

<span id="calorias">0</span>

<small>/2600 kcal</small>

</div>

</div>

<div class="macros">

<div class="macro">

<span>🥩 Proteínas</span>

<strong id="proteinas">0 g</strong>

</div>

<div class="macro">

<span>🍚 Hidratos</span>

<strong id="hidratos">0 g</strong>

</div>

<div class="macro">

<span>🥑 Grasas</span>

<strong id="grasas">0 g</strong>

</div>

</div>

</section>


<section id="meals">

<div class="meal">

<div class="meal-header">

<h2>🍳 Desayuno</h2>

<button class="add">+</button>

</div>

<div class="meal-body">

Sin alimentos

</div>

</div>


<div class="meal">

<div class="meal-header">

<h2>🍝 Comida</h2>

<button class="add">+</button>

</div>

<div class="meal-body">

Sin alimentos

</div>

</div>


<div class="meal">

<div class="meal-header">

<h2>🥪 Merienda</h2>

<button class="add">+</button>

</div>

<div class="meal-body">

Sin alimentos

</div>

</div>


<div class="meal">

<div class="meal-header">

<h2>🌙 Cena</h2>

<button class="add">+</button>

</div>

<div class="meal-body">

Sin alimentos

</div>

</div>

</section>

</div>


<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>

</html>
