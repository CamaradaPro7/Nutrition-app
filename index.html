<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Nutrición</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
padding-bottom:80px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.card{
background:#1e293b;
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.kcal{
font-size:42px;
font-weight:bold;
color:#38bdf8;
}

.meta{
color:#94a3b8;
margin-bottom:15px;
}

.macro{
margin-top:15px;
}

.label{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.bar{
height:12px;
background:#334155;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#22c55e;
}

.meal{
background:#1e293b;
border-radius:16px;
padding:18px;
margin-bottom:15px;
}

.meal h2{
font-size:22px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
}

button:active{
transform:scale(.98);
}

</style>

</head>

<body>

<h1>🍎 Mi Nutrición</h1>

<div class="card">

<div class="meta">Hoy</div>

<div class="kcal">
0 / 2600
</div>

<div class="meta">
kcal
</div>

<div class="macro">

<div class="label">
<span>🥩 Proteínas</span>
<span>0 g</span>
</div>

<div class="bar">
<div class="fill" style="width:0%"></div>
</div>

</div>

<div class="macro">

<div class="label">
<span>🍚 Hidratos</span>
<span>0 g</span>
</div>

<div class="bar">
<div class="fill" style="width:0%;background:#38bdf8"></div>
</div>

</div>

<div class="macro">

<div class="label">
<span>🥑 Grasas</span>
<span>0 g</span>
</div>

<div class="bar">
<div class="fill" style="width:0%;background:#f59e0b"></div>
</div>

</div>

</div>

<div class="meal">

<h2>🍳 Desayuno</h2>

<button>
➕ Añadir alimento
</button>

</div>

<div class="meal">

<h2>🍝 Comida</h2>

<button>
➕ Añadir alimento
</button>

</div>

<div class="meal">

<h2>🥪 Merienda</h2>

<button>
➕ Añadir alimento
</button>

</div>

<div class="meal">

<h2>🌙 Cena</h2>

<button>
➕ Añadir alimento
</button>

</div>

</body>
</html>
