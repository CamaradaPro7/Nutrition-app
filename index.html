<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mi Nutrición V5</title>

<meta
name="theme-color"
content="#0d1117">

<meta
name="description"
content="Mi Nutrición V5 - Control diario de alimentación y macronutrientes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Mi Nutrición">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="format-detection"
content="telephone=no">

<meta
name="color-scheme"
content="dark">

<link
rel="manifest"
href="manifest.json">

<link
rel="apple-touch-icon"
href="icons/icon-192.png">

<link
rel="icon"
type="image/png"
href="icons/icon-192.png">

<link
rel="preload"
href="css/styles.css"
as="style">

<link
rel="stylesheet"
href="css/styles.css">

</head>

<body>

<main class="app">

<header class="header">

<div class="header-center">

<h1 id="greeting">
Buenos días
</h1>

<p id="fecha">
Cargando...
</p>

</div>

</header>

<section
class="dashboard"
aria-label="Resumen diario">

<div class="ring">

<div
class="ring-progress"
id="ringProgress"
role="button"
tabindex="0"
aria-label="Copiar resumen diario">

<div class="ring-center">

<span id="totalKcal">0</span>

<small>
de 2200 kcal
</small>

</div>

</div>

</div>

<div class="macros">

<div class="macro">

<span>
🥩 Proteínas
</span>

<strong id="protein">
0 g
</strong>

</div>

<div class="macro">

<span>
🍚 Hidratos
</span>

<strong id="carbs">
0 g
</strong>

</div>

<div class="macro">

<span>
🥑 Grasas
</span>

<strong id="fat">
0 g
</strong>

</div>

</div>

</section>

<section
id="meals"
aria-label="Comidas">

<section
class="meal"
id="meal-desayuno"
data-meal="desayuno">

<div class="meal-header">

<h2>
🍳 Desayuno
</h2>

<button
class="add"
type="button"
aria-label="Añadir alimento al desayuno">

+

</button>

</div>

<div class="meal-body">

<p class="emptyMeal">

Sin alimentos

</p>

<div class="meal-list"></div>

</div>

</section>

<section
class="meal"
id="meal-comida"
data-meal="comida">

<div class="meal-header">

<h2>
🍝 Comida
</h2>

<button
class="add"
type="button"
aria-label="Añadir alimento a la comida">

+

</button>

</div>

<div class="meal-body">

<p class="emptyMeal">

Sin alimentos

</p>

<div class="meal-list"></div>

</div>

</section>

<section
class="meal"
id="meal-merienda"
data-meal="merienda">

<div class="meal-header">

<h2>
🥪 Merienda
</h2>

<button
class="add"
type="button"
aria-label="Añadir alimento a la merienda">

+

</button>

</div>

<div class="meal-body">

<p class="emptyMeal">

Sin alimentos

</p>

<div class="meal-list"></div>

</div>

</section>

<section
class="meal"
id="meal-cena"
data-meal="cena">

<div class="meal-header">

<h2>
🌙 Cena
</h2>

<button
class="add"
type="button"
aria-label="Añadir alimento a la cena">

+

</button>

</div>

<div class="meal-body">

<p class="emptyMeal">

Sin alimentos

</p>

<div class="meal-list"></div>

</div>

</section>

</section>

</main>

<!-- =====================================================
BIBLIOTECA
===================================================== -->

<div
id="modal"
class="modal"
role="dialog"
aria-modal="true"
aria-labelledby="libraryTitle">

<div class="modal-content">

<button
id="closeFoodModal"
class="close-modal"
type="button"
aria-label="Cerrar biblioteca">

✕

</button>

<h2
id="libraryTitle"
class="modal-title">

📚 Biblioteca

</h2>

<input
id="searchFood"
class="search"
type="search"
autocomplete="off"
placeholder="Buscar alimento...">

<button
id="newFoodBtn"
class="new-food-btn"
type="button">

➕ Añadir alimento

</button>

<div id="foodResults"></div>

</div>

</div>

<!-- =====================================================
GRAMOS
===================================================== -->

<div
id="gramsModal"
class="modal"
role="dialog"
aria-modal="true">

<div class="modal-content">

<h2 class="modal-title">

Cantidad

</h2>

<p id="selectedFood"></p>

<input
id="gramsInput"
class="search"
type="number"
inputmode="decimal"
min="1"
value="100">

<div class="modal-buttons">

<button
id="cancelGrams"
class="secondary-btn"
type="button">

Cancelar

</button>

<button
id="acceptGrams"
class="primary-btn"
type="button">

Añadir

</button>

</div>

</div>

</div>

<!-- =====================================================
IMPORTAR
===================================================== -->

<div
id="newFoodModal"
class="modal"
role="dialog"
aria-modal="true">

<div class="modal-content">

<h2 class="modal-title">

📋 Añadir alimento

</h2>

<textarea

id="jsonInput"

class="json-box"

placeholder="Pega aquí un alimento, una lista o un JSON..."></textarea>

<div
id="jsonStatus"
class="json-status"></div>

<div class="modal-buttons">

<button
id="cancelFood"
class="secondary-btn"
type="button">

Cancelar

</button>

<button
id="saveFood"
class="primary-btn"
type="button">

📥 Importar

</button>

</div>

</div>

</div>

<!-- =====================================================
EDITAR
===================================================== -->

<div
id="editFoodModal"
class="modal"
role="dialog"
aria-modal="true">

<div class="modal-content">

<h2 class="modal-title">

✏️ Editar alimento

</h2>

<input
id="foodName"
class="search"
placeholder="Nombre">

<input
id="foodBrand"
class="search"
placeholder="Marca">

<input
id="foodCategory"
class="search"
placeholder="Categoría">

<div class="modal-grid">

<input
id="foodBase"
class="search"
type="number"
placeholder="Base">

<input
id="foodUnit"
class="search"
placeholder="Unidad">

</div>

<input
id="foodKcal"
class="search"
type="number"
placeholder="kcal">

<input
id="foodProtein"
class="search"
type="number"
placeholder="Proteínas">

<input
id="foodCarbs"
class="search"
type="number"
placeholder="Hidratos">

<input
id="foodFat"
class="search"
type="number"
placeholder="Grasas">

<div class="modal-buttons">

<button
id="cancelEditFood"
class="secondary-btn"
type="button">

Cancelar

</button>

<button
id="saveEditFood"
class="primary-btn"
type="button">

💾 Guardar

</button>

</div>

</div>

</div>

<script defer src="js/db.js"></script>
<script defer src="js/app.js"></script>

</body>

</html>
