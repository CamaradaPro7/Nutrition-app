<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mi Nutrición</title>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="app">

<header class="header">

<div>
<h1>🍎 Mi Nutrición</h1>
<p id="fecha"></p>
</div>

<div class="settings">
⚙️
</div>

</header>


<section class="summary">

<div class="kcal">

<div class="kcal-top">

<div>

<span class="label">
Calorías
</span>

<h2 id="totalKcal">
0
</h2>

<p>
de 2600 kcal
</p>

</div>

<div class="circle">

<span id="porcentaje">
0%
</span>

</div>

</div>

<div class="macros">

<div class="macro">

<div class="macro-row">
<span>🥩 Proteínas</span>
<span id="proteinas">0 g</span>
</div>

<div class="bar">
<div id="barProtein"></div>
</div>

</div>

<div class="macro">

<div class="macro-row">
<span>🍚 Hidratos</span>
<span id="hidratos">0 g</span>
</div>

<div class="bar">
<div id="barCarbs"></div>
</div>

</div>

<div class="macro">

<div class="macro-row">
<span>🥑 Grasas</span>
<span id="grasas">0 g</span>
</div>

<div class="bar">
<div id="barFat"></div>
</div>

</div>

</div>

</div>

</section>


<div id="meals">

<section class="meal">

<div class="meal-head">

<div>

<h3>🍳 Desayuno</h3>

<p>
Sin alimentos
</p>

</div>

<button data-meal="desayuno">
+
</button>

</div>

</section>


<section class="meal">

<div class="meal-head">

<div>

<h3>🍝 Comida</h3>

<p>
Sin alimentos
</p>

</div>

<button data-meal="comida">
+
</button>

</div>

</section>


<section class="meal">

<div class="meal-head">

<div>

<h3>🥪 Merienda</h3>

<p>
Sin alimentos
</p>

</div>

<button data-meal="merienda">
+
</button>

</div>

</section>


<section class="meal">

<div class="meal-head">

<div>

<h3>🌙 Cena</h3>

<p>
Sin alimentos
</p>

</div>

<button data-meal="cena">
+
</button>

</div>

</section>

</div>


<div id="modal" class="modal hidden">

<div class="modal-card">

<div class="modal-header">

<h2>
Añadir alimento
</h2>

<button id="closeModal">
✕
</button>

</div>

<input
id="searchFood"
type="text"
placeholder="Buscar alimento..."
autocomplete="off"
>

<div id="foodResults">

</div>

</div>

</div>


<nav class="bottom">

<button class="active">
🏠
</button>

<button>
📅
</button>

<button class="center">
+
</button>

<button>
📊
</button>

<button>
⚙️
</button>

</nav>

</div>

<script src="js/storage.js"></script>
<script src="js/foods.js"></script>
<script src="js/meals.js"></script>
<script src="js/app.js"></script>

</body>
</html>
